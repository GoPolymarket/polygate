service: polygate
company: company-b
primary_team: company-b
secondary_team: platform-core
core_objective: multitenant gateway reliability

modes:
  - plan
  - execute

roles:
  - id: product
    objective: Define scope and acceptance criteria for this service iteration.
  - id: architect
    objective: Validate module boundaries and service dependency contracts.
  - id: developer
    objective: Ensure compile-level implementation readiness.
  - id: qa
    objective: Verify test readiness and release confidence.
  - id: sre
    objective: Verify runtime/deploy operability prerequisites.
  - id: security
    objective: Run baseline security and secrets hygiene checks.

quality_gates:
  required_roles:
    - developer
    - qa
    - security
